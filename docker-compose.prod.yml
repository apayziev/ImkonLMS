services:
  db:
    image: postgres:16-alpine
    restart: always
    shm_size: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: bash -c "/app/scripts/prestart.sh && gunicorn app.main:app -w 3 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --timeout 120"
    restart: always
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      POSTGRES_SERVER: db
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8080"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    # Reload every 6h so renewed certs (refreshed by certbot every 12h) are picked up.
    command: >
      /bin/sh -c "(while :; do sleep 6h; nginx -s reload 2>/dev/null || true; done) &
                  exec nginx -g 'daemon off;'"
    depends_on:
      - frontend
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot:v3.3.0
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # Daily database backup at 03:00 Asia/Tashkent (off-peak)
  db-backup:
    image: postgres:16-alpine
    restart: always
    environment:
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      PGHOST: db
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY}
      TZ: Asia/Tashkent
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # tzdata is needed for the TZ env var to actually shift cron's clock
        apk add --no-cache curl gnupg tzdata
        cp /usr/share/zoneinfo/Asia/Tashkent /etc/localtime
        echo "Asia/Tashkent" > /etc/timezone
        # Export env vars for cron - single-quote values to handle special chars
        : > /etc/environment
        for var in PGUSER PGPASSWORD PGDATABASE PGHOST TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID BACKUP_ENCRYPTION_KEY TZ; do
          printf "export %s='%s'\n" "$$var" "$$(printenv $$var)" >> /etc/environment
        done
        # Cron time is interpreted in Asia/Tashkent (3 AM local = off-peak).
        echo "0 3 * * * . /etc/environment; /backup.sh >> /var/log/backup.log 2>&1" > /etc/crontabs/root
        # Backup runs only on cron schedule. Container restarts/deploys do NOT
        # trigger a backup — use `make backup` for manual on-demand snapshots.
        crond -f -l 2

volumes:
  postgres_data:
  uploads_data:
  certbot_www:
  certbot_certs:
