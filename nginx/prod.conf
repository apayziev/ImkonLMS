# ─── Rate limiting ─────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ─── Per-subdomain routing via map ────────────────────────────────────────

# Root redirect per subdomain
map $host $root_redirect {
    parent.imkonschool.uz   /parent/login;
    teacher.imkonschool.uz  /login;
    default                 "";
}

# CSP: admin needs TMS iframe + PMS images, others don't
map $host $csp_header {
    lms.imkonschool.uz  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://pms.imkonschool.uz; font-src 'self'; connect-src 'self'; frame-src https://tms.imkonschool.uz; frame-ancestors 'none'";
    default             "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'";
}

# ─── HTTP — health check, certbot, HTTPS redirect ─────────────────────────
server {
    listen 80;
    server_name lms.imkonschool.uz parent.imkonschool.uz teacher.imkonschool.uz;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS — all subdomains (single SAN cert) ─────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name lms.imkonschool.uz parent.imkonschool.uz teacher.imkonschool.uz;

    ssl_certificate     /etc/letsencrypt/live/imkonschool/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imkonschool/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/imkonschool/chain.pem;
    resolver 127.0.0.11 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp_header always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ~ /\. { deny all; return 404; }

    # Performance
    sendfile on;
    tcp_nopush on;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss image/svg+xml;

    client_max_body_size 25m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ─── Root: subdomain-specific redirect ─────────────────────────────
    location = / {
        if ($root_redirect) {
            return 302 $root_redirect;
        }
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Parent: block admin login page ────────────────────────────────
    location = /login {
        if ($host = parent.imkonschool.uz) {
            return 302 /parent/login;
        }
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Admin-only: sync API ──────────────────────────────────────────
    location /api/v1/sync {
        if ($host != lms.imkonschool.uz) {
            return 403;
        }
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Parent-only: restrict to parent API only ──────────────────────
    location /api/v1/parent {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Login: rate limited ───────────────────────────────────────────
    location /api/v1/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── API: block parent subdomain from non-parent endpoints ─────────
    location /api {
        if ($host = parent.imkonschool.uz) {
            return 403;
        }
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
    }

    # ─── Uploads: force download ───────────────────────────────────────
    location /uploads {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
        expires 7d;
        add_header Cache-Control "public" always;
    }

    # ─── Static assets: Vite-hashed → cache 1 year ────────────────────
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # ─── Frontend SPA ──────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
