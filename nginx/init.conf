# Vaqtinchalik HTTP-only config — SSL sertifikat olish uchun
# Faqat init-ssl.sh ishlatilganda qo'llaniladi
server {
    listen 80;
    server_name lms.imkonschool.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Initializing SSL...';
        add_header Content-Type text/plain;
    }
}
