name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Alembic chain integrity
        run: uv run alembic heads | tee /tmp/heads.out && [ "$(wc -l < /tmp/heads.out)" -eq 1 ]

  frontend:
    name: Frontend lint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Biome lint
        run: npx biome lint --no-errors-on-unmatched --files-ignore-unknown=true ./

      - name: TypeScript check
        run: npx tsc -p tsconfig.build.json --noEmit
