<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="IMKON Liderlar Maktabi — O'quv boshqaruv tizimi" />
    <meta name="theme-color" content="#FF3B47" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <title>IMKON LMS</title>
    <style>
      .app-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
      }
      .app-boot::before {
        content: "";
        width: 2rem;
        height: 2rem;
        border-radius: 9999px;
        border: 4px solid #ff3b47;
        border-top-color: transparent;
        animation: app-boot-spin 0.8s linear infinite;
      }
      .app-boot-sr {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      @keyframes app-boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot" role="status" aria-live="polite">
        <span class="app-boot-sr">Yuklanmoqda…</span>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
